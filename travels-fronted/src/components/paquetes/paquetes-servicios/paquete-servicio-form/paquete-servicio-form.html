<form [formGroup]="formulario" (submit)="enviar()">
    <section class="vh-20">

        <div class="container py-5 h-100">

            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-12 col-md-10 col-lg-10">


                    @if(!formularioActivo()){
                    <div class="d-grid mb-4">
                        <button type="button"
                            class="btn btn-success btn-lg shadow-sm d-flex align-items-center justify-content-center gap-2"
                            (click)="abrirFormulario()">
                            <i class="bi bi-plus-circle-fill"></i>
                            <span>Nuevo servicio</span>
                        </button>
                    </div>
                    }


                    @if (hayError()) {
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>Error!</strong> {{mensajeError}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    }

                    @if(formularioActivo()){
                    <div class="card shadow-2-strong" style="border-radius: 1rem;">
                        <div class="card-body p-5">


                            <h3 class="mb-5 text-center">Paquete - servicio</h3>
                            <div class="row mb-4">
                                <div class="col-md-6 mb-4 mb-md-0">

                                    <label class="form-label">Costo: </label>

                                    <input type="number" class="form-control" name="name" formControlName="precio"
                                        [class.is-invalid]="formulario.controls['precio'].invalid && intentoEnviarlo()">
                                    <div class="invalid-feedback">
                                        <div>
                                            costo ( > 0)
                                        </div>
                                    </div>
                                </div>


                                <div class="col-md-6">
                                    <label for="eventType" class="form-label">Proveedor</label>
                                    <select id="eventType" name="eventType" class="form-control"
                                        formControlName="id_proveedor"
                                        [class.is-invalid]="formulario.controls['id_proveedor'].invalid && intentoEnviarlo()">
                                        @for (p of proveedores(); track p.id) {
                                        <option [value]="p.id">
                                            {{ p.nombre }}
                                        </option>
                                        }
                                    </select>
                                    <div class="invalid-feedback">
                                        <div>
                                            Seleccione proveedor
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="exampleFormControlTextarea1" class="form-label">Descripcion</label>
                                <textarea class="form-control" id="exampleFormControlTextarea1"
                                    formControlName="descripcion" rows="3"
                                    [class.is-invalid]="formulario.controls['descripcion'].invalid && intentoEnviarlo()"></textarea>
                            </div>

                            <div class="mt-3">
                                <button class="btn btn-primary w-100 py-2" type="submit">Guardar</button>
                            </div>

                            <div class="mt-4">
                                <button type="button" (click)="cerrarFormulario()"
                                    class="btn btn-secondary py-2 w-100">Cancelar</button>
                            </div>
                        </div>
                    </div>
                    }



                    @if(!formularioActivo()){
                         @for( p of nuevos(); track p){
                            <h1>Cosas</h1>
                            <app-paquete-servicio-card [paqueteServicio] ="p"
                             (editarSeleccinado)="abrirFormularioModoEdicion($event)"
                             (eliminarSeleccionado)="eliminarSeleccionado($event)"></app-paquete-servicio-card>
                         }
                    }

                </div>
            </div>
        </div>
    </section>
</form>
