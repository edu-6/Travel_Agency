<div class="card shadow border-0 h-100">
    <div class="card-header text-center">
        <div class="fw-semibold fs-5">
            {{paqueteServicio.nombreProveedor}}
        </div>
    </div>
    
    <div class="card-body d-flex flex-column">

        <h5 class="mb-2">{{paqueteServicio.nombreProveedor}}</h5>
        <h5 class="mb-2">{{paqueteServicio.id}}</h5>

        <div class="mb-2">
            <i class="bi bi-cash-coin">       {{paqueteServicio.precio}}</i>
        </div>

        <div class="mt-auto d-flex justify-content-center gap-2">

                <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal"
                    data-bs-target="#deleteModal" (click)="eliminar()">
                    <i class="bi bi-trash"></i>
                </button>

                <a  class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-pencil-square" (click)="editar()"></i>
                </a>
        </div>
    </div>
</div>
