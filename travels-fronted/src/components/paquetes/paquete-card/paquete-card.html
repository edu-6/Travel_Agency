<div class="card shadow h-100">
    <div class="card-header text-center bg-light">
        <div class="fw-bold fs-5 text-truncate">
            {{paquete.nombre}}
        </div>
    </div>

    <div class="card-body d-flex flex-column">

        <div class="mb-3 text-muted small">
            <!-- me-4 crea un espacio considerable a la derecha -->
            <span class="me-4">
                <i class="bi bi-geo-alt-fill text-danger"></i> {{paquete.destino}}
            </span>

            <span>
                <i class="bi bi-people-fill"></i> {{paquete.capacidadMaxima}} per
            </span>
        </div>

        <div class="mb-3 text-muted small">
            <span class="me-4">
                <i class="bi bi-clock-fill"></i> {{paquete.duracion}} días
            </span>

            <span class="fw-bold text-success">
                <i class="bi bi-currency-dollar"></i>{{paquete.precioVenta}}
            </span>
        </div>


        <div class="flex-grow-1 d-flex justify-content-center align-items-center mb-4">
            <div class="card" style="width: 100rem;">
                <div class="card-body">
                    <h6 class="card-title text-muted">Descripcion</h6>
                    <p class="card-text">{{paquete.descripcion}}</p>
                </div>
            </div>
        </div>



        <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">
            <div class="d-flex gap-2">
                @if(true){
                <a [routerLink]="['/paquetes/editar-page', paquete.nombre]" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-pencil-square"></i>
                </a>
                }
            </div>

            @if(true){
            <a [routerLink]="['/juegos/detalles', paquete.nombre]" class="btn btn-primary btn-sm px-3">
                <i class="bi bi-eye-fill me-1"></i> Ver detalles
            </a>
            }
        </div>
    </div>
</div>
