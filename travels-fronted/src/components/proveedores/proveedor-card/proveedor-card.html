<div class="card shadow border-0 h-100">
    <div class="card-header text-center">
        <div class="fw-semibold fs-5">
            {{proveedor.nombre}}
        </div>
    </div>
    
    <div class="card-body d-flex flex-column">
        <div class="mb-2">
            <i class="bi bi-geo-alt"></i> {{proveedor.pais}}
        </div>
        
        <h5 class="mb-2">{{proveedor.tipoServicio}}</h5>
        
        <div class="mb-4">
            <i class="bi bi-telephone"></i> {{proveedor.contactos}}
        </div>

        <div class="mt-auto d-flex justify-content-center">
            <a [routerLink]="['/proveedores/editar-page', proveedor.nombre]" 
               class="btn btn-primary px-5">
                Editar
            </a>
        </div>
    </div>
</div>
