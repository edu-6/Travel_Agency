<div class="card shadow h-100">
    <div class="card-header text-center bg-light">
        <div class="fw-bold fs-5 text-truncate">
            {{empleado.nombre}}
        </div>
    </div>

    <div class="card-body d-flex flex-column">
        <div class="mb-3 text-muted small">
            <i class="bi bi-person-circle"> {{empleado.nombreRol}}</i>
        </div>


        <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">
            <div class="d-flex gap-2">
                @if(!esElMismo()){
                <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal"
                    data-bs-target="#deleteModal" (click)="eliminarAccion()">
                    <i class="bi bi-trash"></i>
                </button>

                }@else {
                <h1>(Tú)</h1>
                }
                
                <a [routerLink]="['/empleados/editar-page', empleado.nombre]" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-pencil-square"></i>
                </a>

            </div>

            @if(false){
            <a [routerLink]="['/juegos/detalles', empleado.nombre]" class="btn btn-primary btn-sm px-3">
                <i class="bi bi-eye-fill me-1"></i> Ver detalles
            </a>
            }
        </div>
    </div>
</div>
