<app-header></app-header>

<div class="container text-center my-5">

    <div class="d-flex flex-column align-items-center gap-3 w-100">

        <div [formGroup]="barraBusqueda" class="d-flex justify-content-center gap-2 w-100">
            <input class="form-control flex-grow-1" type="search-primary" placeholder="Search"
                formControlName="busqueda">

            <button class="btn btn-primary" (click)="buscarProveedor()">
                Search
            </button>
        </div>

        <div class="d-flex justify-content-center gap-2">
            <a routerLink="/proveedores/form-page" class="btn btn-primary">
                <i class="bi bi-file-earmark-plus"></i> Nuevo proveedor
            </a>
            <button type="button" class="btn btn-secondary" (click)="buscarTodos()">
                Todos los proveedores
            </button>
        </div>


       <!-- @if (hayError) {
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>Error! </strong> {{mensajeError}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        }-->
    </div>
</div>


@if(buscandoTodos()){
<div class="row row-cols-1 row-cols-md-3 g-4">
    @for (proveedor of proveedores; track proveedor.id) {
    <app-proveedor-card [proveedor]="proveedor"></app-proveedor-card>
    <!--
            <app-empresa-card [empresa]="empresa"
                (empresaFueSeleccionada)="guardarEmpresaSeleccionada($event)"></app-empresa-card>
            Aquí se pone como atributo la empresa del array que se encontrós-->
    }
</div>
}


@if(buscandoUno()){
<div class="d-flex justify-content-center mt-4">
    <div style="width: 100%; max-width: 400px;">
        <app-proveedor-card [proveedor]="proveedorBuscado"></app-proveedor-card>
    </div>
</div>
}
