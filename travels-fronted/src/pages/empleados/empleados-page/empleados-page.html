<app-header></app-header>

<div class="container text-center my-5">
    <div class="d-flex flex-column align-items-center gap-3 w-100">



        <div class="d-flex justify-content-center gap-2 w-100" style="max-width: 600px;">
            <select id="eventType" #comboDestino name="eventType" class="form-select"
                (change)="buscarPorRol(comboDestino.value)">
                @for (rol of roles(); track rol) {
                <option [value]="rol.idRol">
                    {{ rol.nombre}}
                </option>
                }
            </select>
            <button class="btn btn-outline-primary" style="white-space: nowrap;"
                (click)="buscarPorRol(comboDestino.value)">
                Por rol
            </button>
        </div>


        <div class="d-flex justify-content-center">
            <a routerLink="/empleados/form-page" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Nuevo empleado
            </a>
        </div>


        @if (hayError()) {
        <div class="alert alert-danger alert-dismissible fade show w-100" role="alert" style="max-width: 600px;">
            <strong>Error! </strong> {{mensajeError}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        }
    </div>
</div>


@if(buscandoPorRol()){
<div class="row row-cols-1 row-cols-md-3 g-4">
    @for (empleado of empleados(); track empleado.id) {
    <app-empleado-card [empleado]="empleado" (empleadoFueSeleccionado)="guardarDestinoSeleccionado($event)"></app-empleado-card>
    }
</div>
}



@if(buscandoUno()){
<div class="row row-cols-1 row-cols-md-3 g-4">
    <app-empleado-card [empleado]="empleadoEncontrado" (empleadoFueSeleccionado)="guardarDestinoSeleccionado($event)"></app-empleado-card>
</div>
}


<app-modal-generico [mensaje]="mensajeEliminacio" (confirmationExecuter)="eliminarRegistro(comboDestino.value)" />
